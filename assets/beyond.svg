<svg xmlns="http://www.w3.org/2000/svg" width="280" height="220" viewBox="0 0 280 220" fill="none" role="img" aria-label="Beyond code">
  <defs>
    <style type="text/css"><![CDATA[
      .b-item { font: 400 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #3D3D3D; }
    ]]></style>
  </defs>

  <!-- Cooking -->
  <g transform="translate(0, 8)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#E6E6E6" stroke-width="1.2"/>
    <path d="M10 18 C10 12 18 12 18 18" stroke="#8B9A7D" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M14 8 V12" stroke="#8B9A7D" stroke-width="1.3" stroke-linecap="round"/>
    <text class="b-item" x="36" y="19">Cooking</text>
  </g>

  <!-- Reading -->
  <g transform="translate(0, 48)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#E6E6E6" stroke-width="1.2"/>
    <path d="M8 10 H20 V18 H8 Z" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <path d="M14 10 V18" stroke="#8B9A7D" stroke-width="1.2"/>
    <text class="b-item" x="36" y="19">Reading</text>
  </g>

  <!-- Nature -->
  <g transform="translate(0, 88)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#E6E6E6" stroke-width="1.2"/>
    <path d="M14 20 C14 20 8 14 8 10 C8 7 10 5 14 8 C18 5 20 7 20 10 C20 14 14 20 14 20Z" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <text class="b-item" x="36" y="19">Nature</text>
  </g>

  <!-- Quiet places -->
  <g transform="translate(0, 128)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#E6E6E6" stroke-width="1.2"/>
    <circle cx="14" cy="14" r="5" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <circle cx="14" cy="14" r="1.5" fill="#8B9A7D"/>
    <text class="b-item" x="36" y="19">Quiet places</text>
  </g>

  <!-- Systems thinking -->
  <g transform="translate(0, 168)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#E6E6E6" stroke-width="1.2"/>
    <circle cx="10" cy="14" r="3" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <circle cx="18" cy="14" r="3" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <text class="b-item" x="36" y="19">How people &amp; systems work</text>
  </g>
</svg>
