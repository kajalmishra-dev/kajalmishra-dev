<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260" fill="none" role="img" aria-label="Tech stack">
  <defs>
    <style type="text/css"><![CDATA[
      .t-cat { font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0A0A0A; }
      .t-tag { font: 500 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #6B6B6B; }
    ]]></style>
  </defs>

  <!-- Backend -->
  <g transform="translate(0, 8)">
    <rect width="22" height="22" rx="6" fill="#FFFFFF"/>
    <path d="M7 17 L11 7 L15 17" stroke="#8B9A7D" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="t-cat" x="32" y="16">Backend</text>
    <g transform="translate(32, 28)">
      <rect width="58" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="29" y="16" text-anchor="middle">Python</text>
      <rect x="66" y="0" width="62" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="97" y="16" text-anchor="middle">FastAPI</text>
      <rect x="136" y="0" width="62" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="167" y="16" text-anchor="middle">Django</text>
      <rect x="206" y="0" width="46" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="229" y="16" text-anchor="middle">Java</text>
    </g>
  </g>

  <!-- Database -->
  <g transform="translate(0, 72)">
    <rect width="22" height="22" rx="6" fill="#FFFFFF"/>
    <ellipse cx="11" cy="9" rx="5" ry="2.2" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <path d="M6 9 V15 C6 16.5 8 17.5 11 17.5 C14 17.5 16 16.5 16 15 V9" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <text class="t-cat" x="32" y="16">Database</text>
    <g transform="translate(32, 28)">
      <rect width="82" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="41" y="16" text-anchor="middle">PostgreSQL</text>
      <rect x="90" y="0" width="78" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="129" y="16" text-anchor="middle">MongoDB</text>
      <rect x="176" y="0" width="54" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="203" y="16" text-anchor="middle">Redis</text>
      <rect x="238" y="0" width="42" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="259" y="16" text-anchor="middle">SQL</text>
    </g>
  </g>

  <!-- Infrastructure -->
  <g transform="translate(0, 136)">
    <rect width="22" height="22" rx="6" fill="#FFFFFF"/>
    <rect x="6" y="7" width="10" height="8" rx="1.5" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <path d="M8 7 V5.5 H14 V7" stroke="#8B9A7D" stroke-width="1.2"/>
    <text class="t-cat" x="32" y="16">Infrastructure</text>
    <g transform="translate(32, 28)">
      <rect width="62" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="31" y="16" text-anchor="middle">Docker</text>
      <rect x="70" y="0" width="52" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="96" y="16" text-anchor="middle">Linux</text>
      <rect x="130" y="0" width="42" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="151" y="16" text-anchor="middle">Git</text>
    </g>
  </g>

  <!-- AI -->
  <g transform="translate(0, 200)">
    <rect width="22" height="22" rx="6" fill="#FFFFFF"/>
    <circle cx="11" cy="11" r="5" stroke="#8B9A7D" stroke-width="1.2" fill="none"/>
    <circle cx="11" cy="11" r="1.5" fill="#8B9A7D"/>
    <text class="t-cat" x="32" y="16">AI &amp; Systems</text>
    <g transform="translate(32, 28)">
      <rect width="42" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="21" y="16" text-anchor="middle">RAG</text>
      <rect x="50" y="0" width="42" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="71" y="16" text-anchor="middle">NLP</text>
      <rect x="100" y="0" width="58" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="129" y="16" text-anchor="middle">APIs</text>
      <rect x="166" y="0" width="110" height="24" rx="7" fill="#FFFFFF" stroke="#E6E6E6"/>
      <text class="t-tag" x="221" y="16" text-anchor="middle">Distributed Sys</text>
    </g>
  </g>
</svg>
