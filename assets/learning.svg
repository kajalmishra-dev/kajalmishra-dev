<svg xmlns="http://www.w3.org/2000/svg" width="320" height="300" viewBox="0 0 320 300" fill="none" role="img" aria-label="Currently learning">
  <defs>
    <style type="text/css"><![CDATA[
      .l-item { font: 400 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #3D3D3D; }
      .b-title { font: 600 7px ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; }
    ]]></style>
    <linearGradient id="pLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5B19E"/>
      <stop offset="100%" stop-color="#7B8F74"/>
    </linearGradient>
  </defs>

  <circle cx="18" cy="18" r="3.5" fill="#8B9A7D"/>
  <text class="l-item" x="34" y="23">Distributed Systems</text>

  <circle cx="18" cy="50" r="3.5" fill="#8B9A7D"/>
  <text class="l-item" x="34" y="55">AI Infrastructure</text>

  <circle cx="18" cy="82" r="3.5" fill="#8B9A7D"/>
  <text class="l-item" x="34" y="87">PostgreSQL Internals</text>

  <circle cx="18" cy="114" r="3.5" fill="#8B9A7D"/>
  <text class="l-item" x="34" y="119">Production Architecture</text>

  <circle cx="18" cy="146" r="3.5" fill="#8B9A7D"/>
  <text class="l-item" x="34" y="151">System Design</text>

  <!-- books + plant illustration -->
  <g transform="translate(70, 175)">
    <!-- book stack -->
    <rect x="20" y="88" width="120" height="16" rx="2" fill="#6F8168"/>
    <text class="b-title" x="28" y="99">THE CLEAN ARCHITECTURE</text>

    <rect x="14" y="72" width="132" height="16" rx="2" fill="#8B9A7D"/>
    <text class="b-title" x="22" y="83">DESIGNING DATA-INTENSIVE APPS</text>

    <rect x="8" y="56" width="144" height="16" rx="2" fill="#A5B19E"/>
    <text class="b-title" x="16" y="67" fill="#FFFFFF">SYSTEM DESIGN INTERVIEW</text>

    <!-- pot -->
    <path d="M68 56 L72 30 H108 L112 56 Z" fill="#F5F5F5" stroke="#C4C4C4" stroke-width="1"/>
    <ellipse cx="90" cy="30" rx="20" ry="4" fill="#FFFFFF" stroke="#C4C4C4" stroke-width="1"/>

    <!-- plant in pot -->
    <path d="M90 30 C88 18 82 8 74 2" stroke="#6F8168" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M90 30 C92 16 98 6 108 0" stroke="#7B8F74" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M74 2 C66 -4 64 -12 70 -16 C76 -20 84 -14 84 -6 C84 0 78 4 74 2Z" fill="url(#pLeaf)"/>
    <path d="M108 0 C100 -6 98 -14 104 -18 C110 -22 118 -16 118 -8 C118 -2 112 2 108 0Z" fill="url(#pLeaf)"/>
    <path d="M90 12 C82 6 80 -2 86 -6 C92 -10 100 -4 100 4 C100 10 94 14 90 12Z" fill="#9EAD91"/>
