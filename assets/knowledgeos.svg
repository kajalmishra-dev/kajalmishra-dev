<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" fill="none" role="img" aria-label="KnowledgeOS - currently building">
  <defs>
    <style type="text/css"><![CDATA[
      .k-label { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #8B9A7D; letter-spacing: 0.06em; }
      .k-title { font: 700 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #FFFFFF; letter-spacing: -0.02em; }
      .k-badge { font: 500 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #C5D0BB; }
      .k-body { font: 400 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #B8B8B8; }
      .k-tag { font: 500 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #D0D0D0; }
      .k-goal { font: 400 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #8B9A7D; }
    ]]></style>
  </defs>

  <rect width="560" height="320" rx="16" fill="#1C1C1C"/>
  <rect x="0.75" y="0.75" width="558.5" height="318.5" rx="15.25" stroke="#2A2A2A" stroke-width="1.5" fill="none"/>

  <text class="k-label" x="28" y="40">CURRENTLY BUILDING</text>

  <!-- logo mark -->
  <g transform="translate(28, 58)">
    <rect width="28" height="28" rx="7" fill="none" stroke="#8B9A7D" stroke-width="1.5"/>
    <path d="M8 18 L14 8 L20 18" stroke="#8B9A7D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="14" cy="20" r="1.5" fill="#8B9A7D"/>
  </g>

  <text class="k-title" x="68" y="80">KnowledgeOS</text>

  <!-- in progress badge -->
  <rect x="230" y="62" width="88" height="24" rx="12" fill="#2A3228"/>
  <circle cx="246" cy="74" r="3" fill="#8B9A7D"/>
  <text class="k-badge" x="256" y="78">In Progress</text>

  <text class="k-body" x="28" y="122">An AI-powered workspace for organizing, searching,</text>
  <text class="k-body" x="28" y="142">and interacting with personal knowledge.</text>

  <!-- tech tags row 1 -->
  <g transform="translate(28, 168)">
    <rect width="72" height="26" rx="8" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text class="k-tag" x="36" y="17" text-anchor="middle">FastAPI</text>

    <rect x="80" y="0" width="92" height="26" rx="8" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text class="k-tag" x="126" y="17" text-anchor="middle">PostgreSQL</text>

    <rect x="180" y="0" width="62" height="26" rx="8" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text class="k-tag" x="211" y="17" text-anchor="middle">Redis</text>

    <rect x="250" y="0" width="72" height="26" rx="8" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text class="k-tag" x="286" y="17" text-anchor="middle">Docker</text>
  </g>

  <!-- capability tags row 2 -->
  <g transform="translate(28, 206)">
    <rect width="52" height="26" rx="8" fill="#222822" stroke="#3A4538"/>
    <circle cx="14" cy="13" r="2.5" fill="#8B9A7D"/>
    <text class="k-tag" x="34" y="17" text-anchor="middle">RAG</text>

    <rect x="60" y="0" width="58" height="26" rx="8" fill="#222822" stroke="#3A4538"/>
    <circle cx="74" cy="13" r="2.5" fill="#8B9A7D"/>
    <text class="k-tag" x="96" y="17" text-anchor="middle">Auth</text>

    <rect x="126" y="0" width="128" height="26" rx="8" fill="#222822" stroke="#3A4538"/>
    <circle cx="140" cy="13" r="2.5" fill="#8B9A7D"/>
    <text class="k-tag" x="190" y="17" text-anchor="middle">Semantic Search</text>

    <rect x="262" y="0" width="118" height="26" rx="8" fill="#222822" stroke="#3A4538"/>
    <circle cx="276" cy="13" r="2.5" fill="#8B9A7D"/>
    <text class="k-tag" x="322" y="17" text-anchor="middle">Real-time Sync</text>
  </g>

  <line x1="28" y1="258" x2="532" y2="258" stroke="#2A2A2A" stroke-width="1"/>
  <text class="k-goal" x="28" y="286">Goal - make knowledge feel calm, searchable, and useful.</text>
</svg>
