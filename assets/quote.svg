      .q-mark { font: 600 36px Georgia, 'Times New Roman', serif; fill: #8B9A7D; }
      .q-text { font: 400 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #3D3D3D; }
    ]]></style>
  </defs>
  <rect width="360" height="140" rx="14" fill="#FFFFFF"/>
